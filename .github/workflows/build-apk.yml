name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Copy web assets to www
        run: |
          mkdir -p www/js
          cp index.html manifest.json sw.js icon-192.png icon-512.png www/
          cp js/*.js www/js/

      - name: Install Capacitor deps
        run: npm install

      - name: Sync Web Assets to Android
        run: |
          # Manually copy web assets (replaces npx cap sync android)
          mkdir -p android/app/src/main/assets/public
          cp -r www/* android/app/src/main/assets/public/
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json
          echo '[]' > android/app/src/main/assets/capacitor.plugins.json
          mkdir -p android/app/src/main/res/xml
          cp android/app/src/main/res/xml/config.xml android/app/src/main/res/xml/config.xml 2>/dev/null || true
          echo "=== Synced files ==="
          ls -la android/app/src/main/assets/public/
          ls -la android/app/src/main/assets/public/js/

      - name: Build APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apkbanben-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
