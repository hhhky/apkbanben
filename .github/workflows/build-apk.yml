name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Copy web assets to www
        run: |
          mkdir -p www/js
          cp index.html manifest.json sw.js icon-192.png icon-512.png www/
          cp js/*.js www/js/

      - name: Install Capacitor deps
        run: npm install

      - name: Sync Web Assets to Android
        run: |
          mkdir -p android/app/src/main/assets/public
          mkdir -p android/app/src/main/res/xml
          cp -r www/* android/app/src/main/assets/public/
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json
          echo '[]' > android/app/src/main/assets/capacitor.plugins.json

      - name: Build APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apkbanben-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
