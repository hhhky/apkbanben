name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Copy web assets to www
        run: |
          mkdir -p www/js
          cp index.html manifest.json sw.js icon-192.png icon-512.png www/
          cp js/*.js www/js/

      - name: Install Capacitor deps
        run: npm install

      - name: Sync Android
        run: |
          echo "=== capacitor config ==="
          cat capacitor.config.json
          echo "=== www contents ==="
          ls -la www/ && ls -la www/js/
          npx cap sync android 2>&1 || true
          echo "=== Checking generated files ==="
          ls -la android/app/src/main/assets/public/ 2>/dev/null || echo "public dir missing"
          ls -la android/capacitor-cordova-android-plugins/ 2>/dev/null || echo "plugins dir missing"

      - name: Build APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apkbanben-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
