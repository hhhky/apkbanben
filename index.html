<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#7c3aed">
  <title>实用部件</title>
  <script src="js/tailwind.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dopa: {
              purple:  { 50:'#f5f3ff',100:'#ede9fe',400:'#a78bfa',500:'#8b5cf6',600:'#7c3aed',700:'#6d28d9'},
              pink:    { 50:'#fdf2f8',100:'#fce7f3',400:'#f472b6',500:'#ec4899',600:'#db2777'},
              orange:  { 50:'#fff7ed',100:'#ffedd5',400:'#fb923c',500:'#f97316',600:'#ea580c'},
              blue:    { 50:'#eff6ff',100:'#dbeafe',400:'#60a5fa',500:'#3b82f6',600:'#2563eb'},
              mint:    { 50:'#ecfdf5',100:'#d1fae5',400:'#34d399',500:'#10b981',600:'#059669'},
              coral:   { 50:'#fff1f2',100:'#ffe4e6',400:'#fb7185',500:'#f43f5e',600:'#e11d48'},
              sky:     { 50:'#f0f9ff',100:'#e0f2fe',400:'#38bdf8',500:'#0ea5e9',600:'#0284c7'},
              lime:    { 50:'#f7fee7',100:'#ecfccb',400:'#a3e635',500:'#84cc16',600:'#65a30d'},
            }
          }
        }
      }
    }
  </script>
  <script src="js/pdf.min.js"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { overscroll-behavior: none; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', Roboto, sans-serif; }
    .page { display: none; }
    .page.active { display: block; }
    .toast { animation: slideUp 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 99999; }
    @keyframes slideUp { from { transform: translateY(80px) scale(0.9); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 8px rgba(139,92,246,0.3); } 50% { box-shadow: 0 0 20px rgba(139,92,246,0.6); } }
    @keyframes gradient-shift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    @keyframes border-flow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    @keyframes hue-rotate-slow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
    .widget-card-outer {
      background: linear-gradient(135deg, #a855f7, #ec4899, #fb923c, #34d399, #60a5fa, #a855f7);
      background-size: 300% 300%;
      animation: border-flow 4s ease infinite;
    }
    .widget-card-outer:hover {
      animation: border-flow 1.5s ease infinite;
    }
    .preview-overlay { z-index: 9999; }
    .cat-color { width: 14px; height: 14px; border-radius: 50%; display: inline-block; flex-shrink: 0; box-shadow: 0 0 6px currentColor; }

    .btn-gradient {
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      transition: all 0.2s ease;
    }
    .btn-gradient:hover {
      background: linear-gradient(135deg, #7c3aed, #db2777);
      box-shadow: 0 4px 20px rgba(139,92,246,0.4);
      transform: translateY(-1px);
    }
    .btn-gradient:active { transform: scale(0.96); }

    .card-hover {
      transition: all 0.2s ease;
    }
    .card-hover:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(139,92,246,0.12);
    }
    .card-hover:active { transform: scale(0.98); }

    .sidebar-tab {
      transition: all 0.2s ease;
    }
    .sidebar-tab.active {
      background: linear-gradient(135deg, #ede9fe, #fce7f3);
      color: #7c3aed;
    }

    .nav-tab {
      transition: all 0.2s ease;
    }
    .nav-tab.active svg { filter: drop-shadow(0 2px 4px rgba(139,92,246,0.5)); }

    .upload-zone {
      border-color: #d1d5db;
      transition: all 0.3s ease;
      background: linear-gradient(135deg, rgba(139,92,246,0.03), rgba(236,72,153,0.03));
    }
    .upload-zone:hover, .upload-zone:focus-within {
      border-color: #a78bfa;
      background: linear-gradient(135deg, rgba(139,92,246,0.06), rgba(236,72,153,0.06));
      box-shadow: 0 0 30px rgba(139,92,246,0.08);
    }

    .word-preview h2 { font-size: 1.25rem; font-weight: 700; margin: 0.75rem 0 0.5rem; color: #1f2937; }
    .word-preview h3 { font-size: 1.1rem; font-weight: 600; margin: 0.5rem 0 0.25rem; color: #374151; }
    .word-preview h4 { font-size: 1rem; font-weight: 600; margin: 0.5rem 0 0.25rem; color: #4b5563; }
    .word-preview p { margin: 0.25rem 0; font-size: 0.875rem; color: #374151; line-height: 1.6; }
    .word-preview ul,.word-preview ol { margin: 0.25rem 0; padding-left: 1.5rem; font-size: 0.875rem; }
    .word-preview li { margin: 0.125rem 0; }
    .word-preview table { border-collapse: collapse; width: 100%; font-size: 0.8125rem; }
    .word-preview td,.word-preview th { border: 1px solid #d1d5db; padding: 4px 8px; }
    .word-preview img { max-width: 100%; height: auto; }

    @media (max-width: 767px) {
      .main-content.has-nav { padding-bottom: calc(88px + env(safe-area-inset-bottom, 0px)); }
    }
    @media (min-width: 768px) {
      .main-content { padding-bottom: 1.5rem; }
      .modal-sheet { align-items: center; }
      .modal-sheet > div { max-width: 420px; border-radius: 1.25rem; }
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.3); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(139,92,246,0.5); }
  </style>
</head>
<body style="background: linear-gradient(135deg, #faf5ff 0%, #fdf2f8 30%, #fff7ed 60%, #f0f9ff 100%);">

  <div id="app" class="flex flex-col h-screen overflow-hidden md:max-w-none">

    <!-- Header -->
    <header class="text-white px-5 py-4 flex items-center justify-between shrink-0 relative overflow-hidden" style="background: linear-gradient(135deg, #7c3aed 0%, #8b5cf6 30%, #a855f7 60%, #ec4899 100%); background-size: 200% 200%; animation: gradient-shift 8s ease infinite; padding-top: calc(1rem + env(safe-area-inset-top, 0px)); box-shadow: 0 4px 20px rgba(124,58,237,0.3);">
      <div class="absolute inset-0 opacity-20" style="background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.4) 0%, transparent 60%);"></div>
      <div class="flex items-center gap-3 relative z-10">
        <button onclick="goHome()" id="header-back-btn" class="hidden text-white/80 hover:text-white active:scale-90 transition-all p-0.5 -ml-1">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <h1 class="text-lg font-bold tracking-wide" id="header-title">实用部件</h1>
      </div>
      <span class="text-xs px-3 py-1 rounded-full font-medium relative z-10" style="background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);" id="header-badge">1 个部件</span>
    </header>

    <!-- Body: Sidebar + Main -->
    <div class="flex flex-1 overflow-hidden">

      <!-- Sidebar (hidden on mobile) -->
      <aside class="hidden md:flex md:flex-col w-48 lg:w-56 shrink-0" style="background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-right: 1px solid rgba(139,92,246,0.1);">
        <nav class="flex flex-col p-3 gap-1 flex-1" id="sidebar-nav">
          <button onclick="goHome()" id="sidebar-back-btn" class="hidden flex items-center gap-2 px-3 py-2 rounded-xl text-sm font-medium text-gray-400 hover:text-dopa-purple-500 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            <span class="hidden lg:inline">实用部件</span>
          </button>
          <button onclick="switchTab('categories')" class="sidebar-sub sidebar-tab active flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold" data-tab="categories">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
            <span class="hidden lg:inline">分类管理</span>
          </button>
          <button onclick="switchTab('files')" class="sidebar-sub sidebar-tab flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-500" data-tab="files">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            <span class="hidden lg:inline">资料列表</span>
          </button>
          <button onclick="switchTab('upload')" class="sidebar-sub sidebar-tab flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-gray-500" data-tab="upload">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
            <span class="hidden lg:inline">上传资料</span>
          </button>
        </nav>
        <div class="sidebar-sub p-3" style="border-top: 1px solid rgba(139,92,246,0.1);">
          <span class="text-xs text-gray-400" id="sidebar-file-count">共 0 份资料</span>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 overflow-y-auto main-content" id="main-content">

        <!-- Home Page -->
        <div id="page-home" class="page active p-4 md:p-8 lg:p-10">
          <div class="mb-5 md:mb-7">
            <h2 class="text-lg md:text-xl font-bold" style="background: linear-gradient(135deg, #7c3aed, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">我的部件</h2>
            <p class="text-xs text-gray-400 mt-0.5">点击部件进入使用</p>
          </div>
          <div id="widgets-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
          </div>
        </div>

        <!-- Categories Page -->
        <div id="page-categories" class="page p-4 md:p-6 lg:p-8">
          <div class="flex items-center justify-between mb-5 md:mb-7">
            <div>
              <h2 class="text-lg md:text-xl font-bold" style="background: linear-gradient(135deg, #7c3aed, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">分类管理</h2>
              <p class="text-xs text-gray-400 mt-0.5">管理你的资料分类</p>
            </div>
            <button onclick="showAddCategory()" class="btn-gradient text-white text-sm px-5 py-2.5 rounded-full font-semibold shadow-lg">＋ 新建分类</button>
          </div>
          <div id="categories-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
            <div class="text-center text-gray-400 py-12 text-sm col-span-full">还没有分类，点击上方按钮创建</div>
          </div>
        </div>

        <!-- Files Page -->
        <div id="page-files" class="page p-4 md:p-6 lg:p-8">
          <div class="flex flex-col sm:flex-row sm:items-center gap-3 mb-5 md:mb-7">
            <div class="flex gap-2 overflow-x-auto pb-2 sm:pb-0 flex-1" id="category-filter-bar">
              <button onclick="filterFiles(null)" class="cat-filter-btn shrink-0 px-4 py-1.5 rounded-full text-sm font-semibold text-white btn-gradient shadow-md" data-cat="all">全部</button>
            </div>
            <div class="relative">
              <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              <input type="text" id="file-search" oninput="renderFiles()" placeholder="搜索文件名..." class="w-full sm:w-48 lg:w-56 text-sm bg-white/80 backdrop-blur border border-gray-200 rounded-xl pl-9 pr-3 py-2 focus:outline-none focus:border-dopa-purple-400 focus:ring-2 focus:ring-dopa-purple-100 transition-all shrink-0">
            </div>
          </div>
          <div id="files-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
            <div class="text-center text-gray-400 py-12 text-sm col-span-full">还没有上传资料</div>
          </div>
        </div>

        <!-- Upload Page -->
        <div id="page-upload" class="page p-4 md:p-6 lg:p-8">
          <div class="flex flex-col lg:flex-row gap-5 lg:gap-8">
            <!-- Left: File selection -->
            <div class="flex-1">
              <label for="file-input" class="upload-zone bg-white/70 backdrop-blur rounded-2xl p-8 md:p-10 text-center border-2 border-dashed mb-5 block cursor-pointer relative overflow-hidden">
                <input type="file" id="file-input" onchange="onFileSelected(this)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                <div class="text-5xl md:text-6xl mb-4 relative z-10" style="animation: float 3s ease-in-out infinite;">📤</div>
                <p class="text-gray-600 text-sm md:text-base font-medium relative z-10">点击选择文件</p>
                <p class="text-gray-400 text-xs mt-1.5 relative z-10">支持 PDF、图片、Word、Excel 格式</p>
              </label>
              <div id="selected-file-info" class="hidden bg-white/80 backdrop-blur rounded-xl p-4 mb-5 shadow-sm">
                <div class="flex items-center gap-3">
                  <span class="text-2xl" id="selected-file-icon">📄</span>
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold text-gray-800 truncate" id="selected-file-name"></p>
                    <p class="text-xs text-gray-400" id="selected-file-size"></p>
                  </div>
                  <button onclick="clearSelectedFile()" class="w-7 h-7 flex items-center justify-center rounded-full text-gray-400 hover:text-white hover:bg-dopa-coral-400 transition-all text-lg leading-none">&times;</button>
                </div>
              </div>
            </div>

            <!-- Right: Category + Upload -->
            <div class="lg:w-72 xl:w-80 shrink-0">
              <label class="block text-sm font-semibold text-gray-700 mb-2">选择分类</label>
              <div id="upload-category-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-1 gap-2 mb-5">
                <div class="text-center text-gray-400 py-4 text-sm col-span-full">请先创建分类</div>
              </div>
              <button id="upload-btn" onclick="uploadFile()" disabled class="w-full py-3 rounded-xl font-semibold text-white text-sm disabled:opacity-40 transition-all shadow-lg" style="background: linear-gradient(135deg, #d1d5db, #9ca3af);">
                上传资料
              </button>
              <p class="text-xs text-gray-400 text-center mt-3">选择文件和分类后即可上传</p>
            </div>
          </div>
        </div>

      </main>
    </div>

    <!-- Bottom Navigation (mobile only, shown inside widgets) -->
    <nav id="bottom-nav" class="bottom-nav md:hidden fixed bottom-3 left-4 right-4 flex justify-around py-1.5 z-50 mx-auto max-w-sm hidden" style="background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 20px; box-shadow: 0 4px 24px rgba(139,92,246,0.15), 0 1px 4px rgba(0,0,0,0.05);">
      <button onclick="switchTab('categories')" class="nav-tab active flex flex-col items-center gap-0.5 py-1 px-4 rounded-2xl transition-all" style="color: #7c3aed;" data-tab="categories">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
        <span class="text-xs font-medium">分类</span>
      </button>
      <button onclick="switchTab('files')" class="nav-tab flex flex-col items-center gap-0.5 py-1 px-4 rounded-2xl transition-all text-gray-400" data-tab="files">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        <span class="text-xs font-medium">资料</span>
      </button>
      <button onclick="switchTab('upload')" class="nav-tab flex flex-col items-center gap-0.5 py-1 px-4 rounded-2xl transition-all text-gray-400" data-tab="upload">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
        <span class="text-xs font-medium">上传</span>
      </button>
    </nav>

    <!-- Preview Overlay -->
    <div id="preview-overlay" class="preview-overlay fixed inset-0 hidden flex flex-col" style="z-index:9999; background: linear-gradient(180deg, #1a1025 0%, #0f0a1a 100%);">
      <div class="flex items-center justify-between px-3 py-1.5 text-white shrink-0" style="background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding-top: calc(0.375rem + env(safe-area-inset-top, 0px)); border-bottom: 1px solid rgba(255,255,255,0.08);">
        <button onclick="closePreview()" class="text-white/80 hover:text-white active:scale-90 transition-all p-1">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
        <span class="text-sm font-medium truncate mx-2 text-white/90" id="preview-title"></span>
        <button onclick="deletePreviewFile()" class="text-dopa-coral-400 hover:text-dopa-coral-300 active:scale-90 transition-all p-1">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </button>
      </div>
      <div class="flex-1 overflow-auto flex items-center justify-center p-2 md:p-8" id="preview-content" onwheel="onWheelZoom(event)" ontouchstart="onPreviewTouchStart(event)" ontouchmove="onPreviewTouchMove(event)" ontouchend="onPreviewTouchEnd(event)">
        <div class="text-white/60 text-center text-sm">加载中...</div>
      </div>
      <div id="preview-controls" class="hidden flex items-center justify-center gap-2 py-1.5 px-3 text-white shrink-0 flex-wrap" style="background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding-bottom: calc(0.375rem + env(safe-area-inset-bottom, 0px)); border-top: 1px solid rgba(255,255,255,0.08);">
        <button onclick="prevPdfPage()" id="btn-prev-page" class="hidden active:scale-90 transition-transform p-2 text-white/70 hover:text-white"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>
        <span class="text-sm min-w-[2.5rem] text-center text-white/80" id="pdf-page-indicator" style="display:none">1/1</span>
        <button onclick="nextPdfPage()" id="btn-next-page" class="hidden active:scale-90 transition-transform p-2 text-white/70 hover:text-white"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button>
        <span class="text-white/20 mx-1" id="ctl-sep" style="display:none">|</span>
        <div class="flex items-center gap-1 text-sm" style="background: rgba(255,255,255,0.1); border-radius: 10px; padding: 2px 8px;">
          <input type="number" id="zoom-input" value="100" min="25" max="300" oninput="onZoomInput(this)" class="w-12 bg-transparent text-white text-center rounded-lg py-0.5 outline-none appearance-none" style="-webkit-appearance:none;-moz-appearance:textfield; font-weight: 500;">
          <span class="text-white/50 text-xs">%</span>
        </div>
        <button onclick="resetZoom()" class="active:scale-90 transition-transform px-2.5 py-1 text-xs text-white/50 hover:text-white/80 rounded-lg hover:bg-white/10">重置</button>
      </div>
    </div>

    <!-- Category Modal -->
    <div id="category-modal" class="fixed inset-0 hidden flex items-end md:items-center justify-center modal-sheet" style="z-index:9998; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);">
      <div class="bg-white rounded-t-2xl md:rounded-2xl w-full md:max-w-md p-5 shadow-2xl" style="padding-bottom: calc(1.25rem + env(safe-area-inset-bottom, 0px)); animation: fadeIn 0.25s ease;">
        <h3 class="text-lg font-bold mb-4" style="background: linear-gradient(135deg, #7c3aed, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">新建分类</h3>
        <input type="text" id="new-cat-name" placeholder="分类名称，如：英语、政治" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm mb-4 focus:outline-none focus:border-dopa-purple-400 focus:ring-2 focus:ring-dopa-purple-100 transition-all bg-gray-50">
        <label class="block text-sm font-semibold text-gray-700 mb-2">选择颜色</label>
        <div class="flex gap-3 mb-5 flex-wrap" id="color-picker"></div>
        <div class="flex gap-3">
          <button onclick="hideCategoryModal()" class="flex-1 py-3 rounded-xl font-semibold text-gray-500 bg-gray-100 text-sm hover:bg-gray-200 transition-colors">取消</button>
          <button onclick="confirmAddCategory()" class="flex-1 py-3 rounded-xl font-semibold text-white text-sm btn-gradient">确认创建</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 text-white px-5 py-2.5 rounded-full text-sm hidden toast font-medium" style="background: linear-gradient(135deg, rgba(30,10,40,0.9), rgba(60,20,60,0.9)); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); box-shadow: 0 8px 32px rgba(139,92,246,0.3); border: 1px solid rgba(255,255,255,0.15);"></div>

  </div>

  <script src="js/db.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
