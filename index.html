<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#7c3aed">
  <title>实用部件</title>
  <script src="js/tailwind.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dopa: {
              purple:  { 50:'#f5f3ff',100:'#ede9fe',400:'#a78bfa',500:'#8b5cf6',600:'#7c3aed',700:'#6d28d9'},
              pink:    { 50:'#fdf2f8',100:'#fce7f3',400:'#f472b6',500:'#ec4899',600:'#db2777'},
              orange:  { 50:'#fff7ed',100:'#ffedd5',400:'#fb923c',500:'#f97316',600:'#ea580c'},
              blue:    { 50:'#eff6ff',100:'#dbeafe',400:'#60a5fa',500:'#3b82f6',600:'#2563eb'},
              mint:    { 50:'#ecfdf5',100:'#d1fae5',400:'#34d399',500:'#10b981',600:'#059669'},
              coral:   { 50:'#fff1f2',100:'#ffe4e6',400:'#fb7185',500:'#f43f5e',600:'#e11d48'},
              sky:     { 50:'#f0f9ff',100:'#e0f2fe',400:'#38bdf8',500:'#0ea5e9',600:'#0284c7'},
              lime:    { 50:'#f7fee7',100:'#ecfccb',400:'#a3e635',500:'#84cc16',600:'#65a30d'},
            }
          }
        }
      }
    }
  </script>
  <script src="js/pdf.min.js"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    :root {
      --sat: max(24px, env(safe-area-inset-top, 0px));
      --sab: env(safe-area-inset-bottom, 0px);
    }
    body { overscroll-behavior: none; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', Roboto, sans-serif; }
    .page { display: none; }
    .page.active { display: block; }
    .toast { animation: slideUp 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 99999; }
    @keyframes slideUp { from { transform: translateY(80px) scale(0.9); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes pulse-glow { 0%,100% { box-shadow: 0 0 8px rgba(139,92,246,0.3); } 50% { box-shadow: 0 0 20px rgba(139,92,246,0.6); } }
    @keyframes gradient-shift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    @keyframes border-flow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    @keyframes hue-rotate-slow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
    @keyframes jelly {
      0%   { transform: scale(1); }
      25%  { transform: scale(0.9); }
      50%  { transform: scale(1.06); }
      75%  { transform: scale(0.96); }
      100% { transform: scale(1); }
    }
    .btn-jelly:active { animation: jelly 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
    .widget-card-outer {
      background: linear-gradient(135deg, #a855f7, #ec4899, #fb923c, #34d399, #60a5fa, #a855f7);
      background-size: 300% 300%;
      animation: border-flow 10s ease infinite;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .widget-card-outer:hover {
      animation: border-flow 3s ease infinite;
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(139,92,246,0.35) !important;
    }
    /* Mind Map */
    .mindmap-canvas { position: relative; min-height: 700px; overflow: auto; cursor: grab; }
    .mindmap-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    .mindmap-svg line { stroke: #d1d5db; stroke-width: 2; }
    .mindmap-node {
      position: absolute; width: 160px; background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-radius: 18px; padding: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border: 2px solid #f43f5e; cursor: pointer; z-index: 2;
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
      user-select: none; -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    .mindmap-node:hover { box-shadow: 0 4px 20px rgba(244,63,94,0.15); border-color: #e11d48; }
    .mindmap-node.root { border-width: 3px; background: linear-gradient(135deg, rgba(139,92,246,0.06), rgba(236,72,153,0.04)); }
    .mindmap-node.done { border-color: #10b981; opacity: 0.85; background: linear-gradient(135deg, rgba(16,185,129,0.06), rgba(16,185,129,0.02)); }
    .mindmap-node.done:hover { border-color: #059669; box-shadow: 0 4px 20px rgba(16,185,129,0.15); }
    .mindmap-node.done .mindmap-node-title { text-decoration: line-through; color: #9ca3af; }
    .mindmap-node.shape-pill { border-radius: 50px; }
    .mindmap-node.size-small { width: 120px; padding: 8px; }
    .mindmap-node.size-small .mindmap-node-title { font-size: 0.7rem; }
    .mindmap-node.size-medium { width: 160px; padding: 12px; }
    .mindmap-node.size-large { width: 210px; padding: 16px; }
    .mindmap-node.size-large .mindmap-node-title { font-size: 0.9375rem; }
    .mindmap-node.dragging { cursor: grabbing; z-index: 20; box-shadow: 0 8px 30px rgba(139,92,246,0.3); opacity: 0.9; }
    .mindmap-node.knowledge { border-color: #8b5cf6; }
    .mindmap-node.knowledge:hover { border-color: #7c3aed; box-shadow: 0 4px 20px rgba(139,92,246,0.18); }
    .mindmap-node.knowledge.root { border-width: 3px; background: linear-gradient(135deg, rgba(139,92,246,0.06), rgba(168,85,247,0.04)); }
    .mindmap-node-title { font-size: 0.8125rem; font-weight: 600; color: #1f2937; margin-bottom: 2px; word-break: break-word; }
    .mindmap-dir-btn {
      position: absolute; width: 20px; height: 20px; border-radius: 50%;
      background: #fff; border: 2px solid #d1d5db; color: #9ca3af;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; line-height: 1; cursor: pointer; z-index: 3;
      transition: all 0.2s ease; padding: 0;
    }
    .mindmap-dir-btn:hover { border-color: #8b5cf6; color: #8b5cf6; background: #ede9fe; transform: scale(1.2); box-shadow: 0 0 8px rgba(139,92,246,0.3); }
    .mindmap-dir-btn.top { top: -10px; left: 50%; transform: translateX(-50%); }
    .mindmap-dir-btn.bottom { bottom: -10px; left: 50%; transform: translateX(-50%); }
    .mindmap-dir-btn.left { left: -10px; top: 50%; transform: translateY(-50%); }
    .mindmap-dir-btn.right { right: -10px; top: 50%; transform: translateY(-50%); }
    .mindmap-dir-btn.top:hover { transform: translateX(-50%) scale(1.2); }
    .mindmap-dir-btn.bottom:hover { transform: translateX(-50%) scale(1.2); }
    .mindmap-dir-btn.left:hover { transform: translateY(-50%) scale(1.2); }
    .mindmap-dir-btn.right:hover { transform: translateY(-50%) scale(1.2); }
    .mindmap-quick-add {
      position: absolute; z-index: 10; background: #fff; border-radius: 18px;
      padding: 10px; box-shadow: 0 8px 30px rgba(0,0,0,0.15);
      border: 1px solid #e5e7eb; width: 180px;
    }
    .mindmap-quick-add input {
      width: 100%; border: 1px solid #e5e7eb; border-radius: 12px;
      padding: 6px 10px; font-size: 0.8125rem; outline: none; margin-bottom: 6px;
    }
    .mindmap-quick-add input:focus { border-color: #8b5cf6; box-shadow: 0 0 0 2px rgba(139,92,246,0.1); }
    .mindmap-quick-add-btns { display: flex; gap: 6px; }
    .mindmap-quick-add-btns button { flex: 1; padding: 4px 0; border-radius: 10px; font-size: 0.75rem; font-weight: 600; border: none; cursor: pointer; }
    .mindmap-quick-add-confirm { background: linear-gradient(135deg, #8b5cf6, #ec4899); color: #fff; }
    .mindmap-quick-add-cancel { background: #f3f4f6; color: #6b7280; }
    .cal-day { aspect-ratio: 1; border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s ease; position: relative; font-size: 0.875rem; font-weight: 500; color: #374151; }
    .cal-day:hover { background: rgba(139,92,246,0.06); }
    .cal-day.today { background: rgba(139,92,246,0.12); color: #7c3aed; font-weight: 700; }
    .cal-day.selected { box-shadow: inset 0 0 0 2px #8b5cf6; font-weight: 700; }
    .cal-day.other-month { color: #d1d5db; cursor: default; pointer-events: none; }
    .cal-day-legend { display: flex; gap: 2px; justify-content: center; margin-top: 2px; flex-wrap: wrap; }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .memo-card { transition: all 0.2s ease; border-left: 3px solid transparent; }
    .memo-card:hover { border-left-color: #10b981; box-shadow: 0 4px 16px rgba(16,185,129,0.08); }
    .icon-btn-edit, .icon-btn-del {
      width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center;
      border-radius: 12px; color: #cbd5e1; transition: all 0.2s ease; flex-shrink: 0;
    }
    .icon-btn-edit:hover { color: #8b5cf6; background: rgba(139,92,246,0.08); }
    .icon-btn-del:hover { color: #f43f5e; background: rgba(244,63,94,0.08); }
    .cat-card-del { color: rgba(255,255,255,0.7); }
    .cat-card-del:hover { color: #fff; background: rgba(255,255,255,0.15); }
    .icon-btn-edit:active, .icon-btn-del:active { animation: jelly 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
    .preview-overlay { z-index: 9999; }
    .cat-color { width: 14px; height: 14px; border-radius: 50%; display: inline-block; flex-shrink: 0; box-shadow: 0 0 6px currentColor; }

    .btn-gradient {
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      transition: all 0.2s ease;
    }
    .btn-gradient:hover {
      background: linear-gradient(135deg, #7c3aed, #db2777);
      box-shadow: 0 4px 20px rgba(139,92,246,0.4);
      transform: translateY(-1px);
    }
    .btn-gradient:active { animation: jelly 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }

    .card-hover {
      transition: all 0.2s ease;
    }
    .card-hover:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(139,92,246,0.12);
    }
    .card-hover:active { animation: jelly 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }

    .sidebar-tab {
      transition: all 0.2s ease;
    }
    .sidebar-tab.active {
      background: linear-gradient(135deg, #ede9fe, #fce7f3);
      color: #7c3aed;
    }

    .nav-tab {
      transition: all 0.2s ease;
    }
    .nav-tab.active svg { filter: drop-shadow(0 2px 4px rgba(139,92,246,0.5)); }

    .upload-zone {
      border-color: #d1d5db;
      transition: all 0.3s ease;
      background: linear-gradient(135deg, rgba(139,92,246,0.03), rgba(236,72,153,0.03));
    }
    .upload-zone:hover, .upload-zone:focus-within {
      border-color: #a78bfa;
      background: linear-gradient(135deg, rgba(139,92,246,0.06), rgba(236,72,153,0.06));
      box-shadow: 0 0 30px rgba(139,92,246,0.08);
    }

    .word-preview h2 { font-size: 1.25rem; font-weight: 700; margin: 0.75rem 0 0.5rem; color: #1f2937; }
    .word-preview h3 { font-size: 1.1rem; font-weight: 600; margin: 0.5rem 0 0.25rem; color: #374151; }
    .word-preview h4 { font-size: 1rem; font-weight: 600; margin: 0.5rem 0 0.25rem; color: #4b5563; }
    .word-preview p { margin: 0.25rem 0; font-size: 0.875rem; color: #374151; line-height: 1.6; }
    .word-preview ul,.word-preview ol { margin: 0.25rem 0; padding-left: 1.5rem; font-size: 0.875rem; }
    .word-preview li { margin: 0.125rem 0; }
    .word-preview table { border-collapse: collapse; width: 100%; font-size: 0.8125rem; }
    .word-preview td,.word-preview th { border: 1px solid #d1d5db; padding: 4px 8px; }
    .word-preview img { max-width: 100%; height: auto; }

    @media (max-width: 767px) {
      .main-content.has-nav { padding-bottom: calc(88px + var(--sab)); }
    }
    @media (min-width: 768px) {
      .main-content { padding-bottom: 1.5rem; }
      .modal-sheet { align-items: center; }
      .modal-sheet > div { max-width: 420px; border-radius: 1.5rem; }
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.3); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(139,92,246,0.5); }

    /* Chat */
    .chat-welcome { text-align: center; padding: 32px 16px; }
    .chat-welcome-icon { font-size: 3.5rem; margin-bottom: 12px; }
    .chat-welcome h2 { font-size: 1.25rem; font-weight: 700; color: #1f2937; margin-bottom: 6px; }
    .chat-welcome-sub { font-size: 0.8125rem; color: #9ca3af; margin-bottom: 20px; }
    .chat-suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .chat-suggestion { background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid #e5e7eb; border-radius: 20px; padding: 8px 16px; font-size: 0.8125rem; color: #374151; cursor: pointer; transition: all 0.2s ease; white-space: nowrap; }
    .chat-suggestion:hover { border-color: #a78bfa; background: rgba(139,92,246,0.06); color: #7c3aed; }
    .chat-msg { display: flex; margin-bottom: 16px; animation: fadeIn 0.3s ease; }
    .chat-msg-user { justify-content: flex-end; }
    .chat-msg-ai { align-items: flex-start; gap: 8px; }
    .chat-ai-avatar { width: 30px; height: 30px; border-radius: 12px; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 0.875rem; flex-shrink: 0; }
    .chat-ai-body { flex: 1; min-width: 0; }
    .chat-bubble { max-width: 85%; padding: 10px 16px; border-radius: 18px; font-size: 0.875rem; line-height: 1.6; word-break: break-word; }
    .chat-bubble-user { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border-bottom-right-radius: 6px; }
    .chat-bubble-ai { background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid #e5e7eb; color: #374151; border-bottom-left-radius: 6px; }
    .chat-bubble-ai p { margin: 0.25rem 0; }
    .chat-bubble-ai p:first-child { margin-top: 0; }
    .chat-bubble-ai p:last-child { margin-bottom: 0; }
    .chat-bubble-ai h1, .chat-bubble-ai h2, .chat-bubble-ai h3, .chat-bubble-ai h4 { margin: 0.5rem 0 0.25rem; font-weight: 600; }
    .chat-bubble-ai h1 { font-size: 1.2rem; }
    .chat-bubble-ai h2 { font-size: 1.1rem; }
    .chat-bubble-ai h3 { font-size: 1rem; }
    .chat-bubble-ai h4 { font-size: 0.9375rem; }
    .chat-bubble-ai ul, .chat-bubble-ai ol { margin: 0.25rem 0; padding-left: 1.5rem; }
    .chat-bubble-ai li { margin: 2px 0; }
    .chat-bubble-ai a { color: #6366f1; text-decoration: underline; }
    .chat-bubble-ai strong { font-weight: 600; color: #1f2937; }
    .chat-bubble-ai em { font-style: italic; }
    .chat-bubble-ai hr { border: none; border-top: 1px solid #e5e7eb; margin: 8px 0; }
    .chat-bubble-ai .code-block { background: #1e1e2e; color: #cdd6f4; border-radius: 12px; padding: 12px 16px; overflow-x: auto; margin: 8px 0; font-size: 0.8125rem; line-height: 1.5; position: relative; }
    .chat-bubble-ai .code-block .code-lang { position: absolute; top: 6px; right: 12px; font-size: 0.6875rem; color: #6c7086; text-transform: uppercase; }
    .chat-bubble-ai .code-block code { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; }
    .chat-bubble-ai .inline-code { background: #f3f4f6; color: #e11d48; padding: 1px 5px; border-radius: 4px; font-size: 0.8125rem; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; }
    .reasoning-block { background: #f8f9fa; border: 1px solid #e5e7eb; border-radius: 12px; margin-bottom: 8px; overflow: hidden; }
    .reasoning-block.reasoning-done { border-color: #d1d5db; }
    .reasoning-header { display: flex; align-items: center; gap: 6px; padding: 8px 12px; cursor: pointer; user-select: none; -webkit-user-select: none; font-size: 0.75rem; color: #6b7280; }
    .reasoning-header:hover { background: rgba(0,0,0,0.02); }
    .reasoning-icon { font-size: 0.875rem; }
    .reasoning-label { flex: 1; }
    .reasoning-done .reasoning-label { color: #10b981; }
    .reasoning-toggle { font-size: 0.75rem; transition: transform 0.2s ease; }
    .reasoning-content { padding: 0 12px 10px; font-size: 0.75rem; color: #9ca3af; line-height: 1.5; display: block; }
    .reasoning-open .reasoning-content { display: block; }
    .chat-error { color: #ef4444; font-size: 0.8125rem; }
    #chat-messages { scroll-behavior: smooth; }
    #page-chat.active { display: flex; flex-direction: column; }
  </style>

</head>
<body style="background: linear-gradient(135deg, #faf5ff 0%, #fdf2f8 30%, #fff7ed 60%, #f0f9ff 100%);">

  <div id="app" class="flex flex-col h-screen overflow-hidden md:max-w-none">

    <!-- Header -->
    <header class="text-white px-5 py-4 flex items-center justify-between shrink-0 relative overflow-hidden" style="background: linear-gradient(135deg, #7c3aed 0%, #8b5cf6 30%, #a855f7 60%, #ec4899 100%); background-size: 200% 200%; animation: gradient-shift 8s ease infinite; padding-top: calc(0.75rem + var(--sat)); box-shadow: 0 4px 20px rgba(124,58,237,0.3); min-height: calc(56px + var(--sat));">
      <div class="absolute inset-0 opacity-20" style="background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.4) 0%, transparent 60%);"></div>
      <div class="flex items-center gap-3 relative z-10">
        <button onclick="goHome()" id="header-back-btn" class="hidden text-white/80 hover:text-white btn-jelly transition-all p-0.5 -ml-1">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <h1 class="text-lg font-bold tracking-wide" id="header-title">实用部件</h1>
      </div>
      <span class="text-xs px-3 py-1 rounded-full font-medium relative z-10" style="background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);" id="header-badge">1 个部件</span>
    </header>

    <!-- Body: Sidebar + Main -->
    <div class="flex flex-1 overflow-hidden">

      <!-- Sidebar (hidden on mobile) -->
      <aside class="hidden md:flex md:flex-col w-48 lg:w-56 shrink-0" style="background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-right: 1px solid rgba(139,92,246,0.1);">
        <nav class="flex flex-col p-3 gap-1 flex-1" id="sidebar-nav">
          <button onclick="goHome()" id="sidebar-back-btn" class="hidden flex items-center gap-2 px-3 py-2 rounded-[20px] text-sm font-medium text-gray-400 hover:text-dopa-purple-500 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            <span class="hidden lg:inline">实用部件</span>
          </button>
          <div id="sidebar-tabs-container" class="flex flex-col gap-1"></div>
        </nav>
        <div id="sidebar-footer" class="hidden p-3" style="border-top: 1px solid rgba(139,92,246,0.1);">
          <span class="text-xs text-gray-400" id="sidebar-footer-text"></span>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 overflow-y-auto main-content" id="main-content">

        <!-- Home Page -->
        <div id="page-home" class="page active p-4 md:p-8 lg:p-10">
          <div class="mb-5 md:mb-7">
            <h2 class="text-lg md:text-xl font-bold" style="background: linear-gradient(135deg, #7c3aed, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">我的部件</h2>
            <p class="text-xs text-gray-400 mt-0.5">点击部件进入使用</p>
          </div>
          <div id="widgets-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
          </div>
        </div>

        <!-- Categories Page -->
        <div id="page-categories" class="page p-4 md:p-6 lg:p-8">
          <div class="flex items-center justify-between mb-5 md:mb-7">
            <div>
              <h2 class="text-lg md:text-xl font-bold" style="background: linear-gradient(135deg, #7c3aed, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">分类管理</h2>

        <div class="flex gap-3">
          <button onclick="hideMemoModal()" class="flex-1 py-3 rounded-[20px] font-semibold text-gray-500 bg-gray-100 text-sm hover:bg-gray-200 transition-colors">取消</button>
          <button onclick="confirmMemo()" id="memo-confirm-btn" class="flex-1 py-3 rounded-[20px] font-semibold text-white text-sm btn-gradient">确认创建</button>
        </div>
      </div>
    </div>

    <!-- Workflow Modal -->
    <div id="workflow-modal" class="fixed inset-0 hidden flex items-end md:items-center justify-center modal-sheet" style="z-index:9998; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);">
      <div class="bg-white rounded-t-[28px] md:rounded-[28px] w-full md:max-w-md p-5 shadow-2xl" style="padding-bottom: calc(1.25rem + var(--sab)); animation: fadeIn 0.25s ease;">
        <h3 id="workflow-modal-title" class="text-lg font-bold mb-4" style="background: linear-gradient(135deg, #7c3aed, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">新建思维导图</h3>
        <input type="text" id="workflow-name-input" placeholder="思维导图名称" class="w-full border border-gray-200 rounded-[20px] px-4 py-3 text-sm mb-3 focus:outline-none focus:border-dopa-purple-400 focus:ring-2 focus:ring-dopa-purple-100 transition-all bg-gray-50">
        <div id="workflow-node-fields" class="hidden">
          <input type="text" id="node-title-input" placeholder="节点标题" class="w-full border border-gray-200 rounded-[20px] px-4 py-3 text-sm mb-3 focus:outline-none focus:border-dopa-purple-400 focus:ring-2 focus:ring-dopa-purple-100 transition-all bg-gray-50">
          <textarea id="node-desc-input" rows="2" placeholder="节点描述（可选）" class="w-full border border-gray-200 rounded-[20px] px-4 py-3 text-sm mb-3 focus:outline-none focus:border-dopa-purple-400 focus:ring-2 focus:ring-dopa-purple-100 transition-all bg-gray-50 resize-none"></textarea>
          <label class="block text-sm font-semibold text-gray-700 mb-2">节点形状</label>
          <div class="flex gap-2 mb-4" id="node-shape-select">
            <button onclick="selectNodeShape('rounded')" class="node-shape-btn flex-1 py-2 rounded-[20px] text-xs font-medium border-2 border-dopa-purple-400 bg-dopa-purple-50 text-dopa-purple-500" data-shape="rounded">圆角矩形</button>
            <button onclick="selectNodeShape('pill')" class="node-shape-btn flex-1 py-2 rounded-full text-xs font-medium border-2 border-gray-200 text-gray-500" data-shape="pill">胶囊形</button>
          </div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">节点大小</label>
          <div class="flex gap-2 mb-4" id="node-size-select">
            <button onclick="selectNodeSize('small')" class="node-size-btn flex-1 py-2 rounded-[20px] text-xs font-medium border-2 border-gray-200 text-gray-500" data-size="small">小</button>
            <button onclick="selectNodeSize('medium')" class="node-size-btn flex-1 py-2 rounded-[20px] text-xs font-medium border-2 border-dopa-purple-400 bg-dopa-purple-50 text-dopa-purple-500" data-size="medium">中</button>
            <button onclick="selectNodeSize('large')" class="node-size-btn flex-1 py-2 rounded-[20px] text-xs font-medium border-2 border-gray-200 text-gray-500" data-size="large">大</button>
          </div>
        </div>
        <div class="flex gap-3">
          <button onclick="hideWorkflowModal()" class="flex-1 py-3 rounded-[20px] font-semibold text-gray-500 bg-gray-100 text-sm hover:bg-gray-200 transition-colors">取消</button>
          <button onclick="confirmWorkflowModal()" class="flex-1 py-3 rounded-[20px] font-semibold text-white text-sm btn-gradient">确认</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-20 left-1/2 -translate-x-1/2 text-white px-5 py-2.5 rounded-full text-sm hidden toast font-medium" style="background: linear-gradient(135deg, rgba(30,10,40,0.9), rgba(60,20,60,0.9)); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); box-shadow: 0 8px 32px rgba(139,92,246,0.3); border: 1px solid rgba(255,255,255,0.15);"></div>

  </div>

  <script src="js/db.js"></script>
  <script src="js/config.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
